name: Java CI with Maven
# Test caching speed for 2 times for Bai 6
# Nhiệm vụ: Kích hoạt workflow khi có sự kiện push và pull_request
on:
  push:
    branches: [ "main", "master" ]
  pull_request: # trigger cho bài 7
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # Bước 1: Lấy mã nguồn từ repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Bài 6 Thiết lập JDK 11 (Để tăng tốc pipeline)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven # Kích hoạt dependency caching cho Bài 6

      # Bước 3: Kiểm tra chất lượng code (Bài 2) trước khi build (Vô hiệu hóa cho bài 6)
      - name: Run Checkstyle
        continue-on-error: true # cho phép đi tiếp để bot có cơ hội comment
        run: mvn checkstyle:check

      # Bài 7 : Inline Feedback - Bot t động comment lên lỗi Pull Request
      - name : Checkstyle PR Comments
        if :
          ${{ github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'}}
        uses: dbelyaev/action-checkstyle@v1.2.0
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          reporter: github-pr-review



      # Bước 4: Bài 3 & 5 - Chạy Test, đo Coverage (JaCoCo) và đóng gói (.jar)
      # Lệnh verify sẽ thực hiện: test -> package -> check jacoco coverage
      - name: Build And Verify with Maven
        run: mvn -B verify -Djacoco.skip=true --file pom.xml

      # Bước 5: Bài 3 & 4 - Lưu trữ tệp .jar (Artifacts)
      - name: Upload Build Artifact (.jar)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bank-system-artifact-${{ matrix.os }}
          path: target/*.jar

      # Bước 6: Bài  5- Lưu tr báo cáo Jacoco (HTML)
      #Tạm thời vô hiệu hóa cho bài 7
#      - name: Upload JaCoCo Report
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: jacoco-report-${{ matrix.os }}
#          path: target/site/jacoco